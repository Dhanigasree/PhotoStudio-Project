
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photostudio-frontend
  namespace: photostudio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photostudio-frontend
  template:
    metadata:
      labels:
        app: photostudio-frontend
    spec:
      containers:
      - name: frontend-container
        image: ashutosh4782/photostudio-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: BACKEND_URL
          value: "http://photostudio-backend-service:3000"
