
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photostudio-backend
  namespace: photostudio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photostudio-backend
  template:
    metadata:
      labels:
        app: photostudio-backend
    spec:
      containers:
      - name: backend-container
        image: dhaniga/photostudio-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: photostudio-backend-config
